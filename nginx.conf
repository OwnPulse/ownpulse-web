server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Static assets — long cache (hashed filenames)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy waitlist API to backend service (resolve at runtime so
    # nginx starts even if the waitlist service isn't deployed yet)
    location = /api/waitlist {
        if ($request_method != POST) {
            return 405;
        }
        resolver kube-dns.kube-system.svc.cluster.local valid=30s;
        set $waitlist_upstream "http://ownpulse-waitlist.ownpulse.svc.cluster.local:8080";
        proxy_pass $waitlist_upstream/api/waitlist;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # HTML pages — no cache (so deploys take effect immediately)
    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
