server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Static assets — long cache (hashed filenames)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Stub waitlist endpoint — returns 200 with {"ok": true}
    location = /api/waitlist {
        if ($request_method != POST) {
            return 405;
        }
        default_type application/json;
        return 200 '{"ok": true}';
    }

    # HTML pages — no cache (so deploys take effect immediately)
    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
