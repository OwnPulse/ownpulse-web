apiVersion: v1
kind: Service
metadata:
  name: {{ include "ci-metrics.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "ci-metrics.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8081"
    prometheus.io/path: "/metrics"
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8081
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "ci-metrics.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
