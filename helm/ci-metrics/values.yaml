replicaCount: 1

image:
  repository: ghcr.io/ownpulse/ownpulse-ci-metrics
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

resources:
  requests:
    memory: 32Mi
    cpu: 10m
  limits:
    memory: 64Mi
    cpu: 100m

imagePullSecrets:
  - name: ghcr-pull-secret

secret:
  name: ci-metrics-webhook-secret
  key: WEBHOOK_SECRET
