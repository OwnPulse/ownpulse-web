{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-postgres" (include "ownpulse-waitlist.fullname" .))) }}
{{- $password := "" }}
{{- if $existingSecret }}
{{- $password = index $existingSecret.data "POSTGRES_PASSWORD" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 24 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ownpulse-waitlist.fullname" . }}-postgres
  labels:
    app.kubernetes.io/name: {{ include "ownpulse-waitlist.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $password }}
  POSTGRES_USER: waitlist
  POSTGRES_DB: waitlist
  DATABASE_URL: postgres://waitlist:{{ $password }}@{{ include "ownpulse-waitlist.fullname" . }}-postgres:5432/waitlist?sslmode=disable
