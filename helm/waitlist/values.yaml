replicaCount: 1

image:
  repository: ghcr.io/ownpulse/ownpulse-waitlist
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    memory: 16Mi
    cpu: 10m
  limits:
    memory: 32Mi
    cpu: 50m

imagePullSecrets:
  - name: ghcr-pull-secret

postgres:
  storage: 1Gi
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m
