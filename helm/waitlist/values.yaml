replicaCount: 1

image:
  repository: ghcr.io/ownpulse/ownpulse-waitlist
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    memory: 16Mi
    cpu: 10m
  limits:
    memory: 32Mi
    cpu: 50m

imagePullSecrets:
  - name: ghcr-pull-secret

secretName: ownpulse-waitlist-secrets
