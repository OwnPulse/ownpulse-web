replicaCount: 1

image:
  repository: ghcr.io/ownpulse/ownpulse-web-public
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
  hosts:
    - host: ownpulse.health
      paths:
        - path: /
          pathType: Prefix
    - host: www.ownpulse.health
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ownpulse-health-tls
      hosts:
        - ownpulse.health
        - www.ownpulse.health

imagePullSecrets:
  - name: ghcr-pull-secret

resources:
  requests:
    memory: 32Mi
    cpu: 25m
  limits:
    memory: 64Mi
    cpu: 100m
