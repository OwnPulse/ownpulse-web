name: site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/**
      - public/**
      - package.json
      - package-lock.json
      - astro.config.mjs
      - tsconfig.json
      - nginx.conf
      - Dockerfile
      - helm/web-public/**
  pull_request:
    paths:
      - src/**
      - public/**
      - package.json
      - package-lock.json
      - astro.config.mjs
      - tsconfig.json
      - nginx.conf
      - Dockerfile
      - helm/web-public/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Build Docker image (PR validation)
        if: github.event_name == 'pull_request'
        run: docker build .

      - uses: OwnPulse/gh-actions/docker-build-push@v1
        if: github.event_name != 'pull_request'
        with:
          context: .
          image-name: ownpulse-web-public
          tag: ${{ github.sha }}

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4

      - uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: web-public
          chart-path: helm/web-public
          namespace: ownpulse
          image-tag: ${{ github.sha }}
          deployment-name: web-public-ownpulse-web-public
          timeout: 300s
