# SPDX-License-Identifier: AGPL-3.0-or-later
name: waitlist

on:
  push:
    branches: [main]
    paths:
      - waitlist/**
      - helm/waitlist/**
  pull_request:
    paths:
      - waitlist/**
      - helm/waitlist/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ownpulse/ownpulse-waitlist

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waitlist_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: waitlist/go.mod

      - name: Run tests
        run: cd waitlist && go test -v -count=1 ./...
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/waitlist_test?sslmode=disable

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: waitlist
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy waitlist
        run: >
          helm upgrade --install waitlist helm/waitlist
          -n ownpulse
          --set image.tag=sha-${GITHUB_SHA::7}
          --atomic --timeout 300s
