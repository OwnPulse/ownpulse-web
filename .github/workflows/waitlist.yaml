# SPDX-License-Identifier: AGPL-3.0-or-later
name: waitlist

on:
  push:
    branches: [main]
    paths:
      - waitlist/**
      - helm/waitlist/**
  pull_request:
    paths:
      - waitlist/**
      - helm/waitlist/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: waitlist_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: waitlist/go.mod

      - name: Run tests
        run: cd waitlist && go test -v -count=1 ./...
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/waitlist_test?sslmode=disable

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Build Docker image (PR validation)
        if: github.event_name == 'pull_request'
        run: docker build waitlist

      - uses: OwnPulse/gh-actions/docker-build-push@v1
        if: github.event_name == 'push'
        with:
          context: waitlist
          image-name: ownpulse-waitlist
          tag: ${{ github.sha }}

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4

      - uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: waitlist
          chart-path: helm/waitlist
          namespace: ownpulse
          image-tag: ${{ github.sha }}
          deployment-name: waitlist-ownpulse-waitlist
          timeout: 300s
