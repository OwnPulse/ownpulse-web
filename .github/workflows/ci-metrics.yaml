# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci-metrics

on:
  push:
    branches: [main]
    paths: [ci-metrics/**]
  pull_request:
    paths: [ci-metrics/**]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (PR validation)
        if: github.event_name == 'pull_request'
        run: docker build ci-metrics

      - uses: OwnPulse/gh-actions/docker-build-push@v1
        if: github.event_name == 'push'
        with:
          context: ci-metrics
          image-name: ownpulse-ci-metrics
          tag: ${{ github.sha }}

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@v4

      - uses: OwnPulse/gh-actions/helm-deploy@v1
        with:
          release-name: ci-metrics
          chart-path: helm/ci-metrics
          namespace: ownpulse
          image-tag: ${{ github.sha }}
          deployment-name: ci-metrics
          timeout: 120s
